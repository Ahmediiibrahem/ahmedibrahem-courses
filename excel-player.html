<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشغّل مسار Excel — Ahmed Ibrahem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #071a1c; --bg-soft: #0a2124; --surface: #0e2a2d; --surface-2: #123338;
    --border: rgba(148, 217, 211, 0.14); --border-strong: rgba(148, 217, 211, 0.28);
    --text: #eaf7f6; --text-muted: #93b3b1; --text-dim: #5f8482;
    --accent: #2fe8d6; --accent-soft: rgba(47, 232, 214, 0.12); --accent-deep: #0f8c8c; --accent-ink: #052221;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--text); font-family:'IBM Plex Sans Arabic', sans-serif; line-height:1.6; }
  h1,h2,h3,h4{ font-family:'Cairo', sans-serif; font-weight:800; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }

  header{ position:sticky; top:0; z-index:50; background:rgba(7,26,28,0.9); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); }
  .nav{ display:flex; align-items:center; justify-content:space-between; padding:14px 24px; }
  .logo{ display:flex; align-items:center; gap:10px; font-family:'Cairo'; font-weight:800; font-size:18px; }
  .logo .mark{ width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg, var(--accent), var(--accent-deep)); display:flex; align-items:center; justify-content:center; color:var(--accent-ink); font-weight:900; font-size:14px; }
  .logo .name span{ color:var(--accent); }
  .track-progress-mini{ display:flex; align-items:center; gap:12px; font-size:13px; color:var(--text-muted); }
  .track-progress-mini .bar{ width:140px; height:7px; border-radius:100px; background:var(--surface-2); overflow:hidden; }
  .track-progress-mini .bar-fill{ height:100%; background:var(--accent); border-radius:100px; transition:width .3s; }

  .layout{ display:grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 62px); }

  /* Sidebar */
  .sidebar{ border-left:1px solid var(--border); background:var(--bg-soft); display:flex; flex-direction:column; max-height: calc(100vh - 62px); position:sticky; top:62px; }
  .tabs{ display:flex; gap:6px; padding:14px; overflow-x:auto; border-bottom:1px solid var(--border); flex-shrink:0; }
  .tab{ flex-shrink:0; width:38px; height:38px; border-radius:10px; background:var(--surface); border:1px solid var(--border-strong); color:var(--text-muted); display:flex; align-items:center; justify-content:center; font-family:'Cairo'; font-weight:800; font-size:14px; position:relative; }
  .tab.active{ background:var(--accent); color:var(--accent-ink); border-color:transparent; }
  .tab.done::after{ content:'✓'; position:absolute; top:-5px; left:-5px; width:16px; height:16px; background:var(--accent); color:var(--accent-ink); border-radius:50%; font-size:10px; display:flex; align-items:center; justify-content:center; font-weight:900; }

  .sidebar-head{ padding:16px 18px 10px; flex-shrink:0; }
  .sidebar-head h3{ font-size:15px; margin-bottom:4px; }
  .sidebar-head .meta{ font-size:12px; color:var(--text-dim); }
  .sidebar-head .note{ font-size:11px; color:var(--accent); background:var(--accent-soft); border:1px solid var(--border-strong); padding:3px 10px; border-radius:100px; display:inline-block; margin-top:8px; }
  .restart-btn{
    margin-top:12px; width:100%; background:transparent; border:1px solid var(--border-strong);
    color:var(--text-muted); padding:9px 14px; border-radius:9px; font-size:12.5px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px; transition:border-color .2s, color .2s;
  }
  .restart-btn:hover{ border-color:#e85d5d; color:#e85d5d; }

  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(4,12,13,0.72); backdrop-filter:blur(4px);
    z-index:200; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:var(--surface); border:1px solid var(--border-strong); border-radius:20px;
    padding:32px; max-width:380px; width:100%; text-align:center;
  }
  .modal-box h3{ font-size:19px; margin-bottom:10px; }
  .modal-box p{ color:var(--text-muted); font-size:13.5px; margin-bottom:22px; }
  .captcha-code{
    display:flex; justify-content:center; gap:8px; margin-bottom:18px; user-select:none;
    background:var(--bg-soft); border:1px solid var(--border); border-radius:12px; padding:16px;
  }
  .captcha-code span{ font-family:'Cairo'; font-weight:800; font-size:26px; display:inline-block; }
  .captcha-code .noise-line{ position:absolute; }
  .modal-box input{
    width:100%; text-align:center; letter-spacing:6px; font-size:18px; font-family:'Cairo'; font-weight:700;
    background:var(--bg-soft); border:1px solid var(--border-strong); border-radius:10px;
    padding:12px; color:var(--text); margin-bottom:10px;
  }
  .modal-error{ color:#e85d5d; font-size:12.5px; margin-bottom:10px; min-height:16px; }
  .modal-actions{ display:flex; gap:10px; margin-top:6px; }
  .modal-actions button{ flex:1; padding:12px; border-radius:10px; font-weight:700; font-size:14px; border:none; }
  .modal-cancel{ background:var(--bg-soft); color:var(--text-muted); border:1px solid var(--border-strong) !important; }
  .modal-confirm{ background:#e85d5d; color:#2a0a0a; }

  .video-list{ overflow-y:auto; flex:1; padding: 6px 10px 20px; }
  .section-title{ font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em; padding:16px 10px 8px; font-family:'Cairo'; }
  .video-row{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; cursor:pointer; transition:background .15s; }
  .video-row:hover{ background:var(--surface); }
  .video-row.current{ background:var(--accent-soft); border:1px solid var(--border-strong); }
  .video-row input[type=checkbox]{ width:17px; height:17px; accent-color: var(--accent); flex-shrink:0; cursor:pointer; }
  .video-row .vtitle{ flex:1; font-size:13.5px; color:var(--text); }
  .video-row.current .vtitle{ color:var(--accent); font-weight:600; }
  .video-row.done .vtitle{ color:var(--text-dim); text-decoration:line-through; }
  .video-row .vdur{ font-size:11px; color:var(--text-dim); flex-shrink:0; }

  /* Main */
  .main{ padding: 34px 40px; max-width: 880px; }
  .breadcrumb{ font-size:13px; color:var(--text-dim); margin-bottom:16px; }
  .breadcrumb b{ color:var(--accent); font-weight:600; }
  .player-box{
    aspect-ratio: 16/9; background: linear-gradient(160deg, var(--surface-2), var(--bg-soft));
    border:1px solid var(--border-strong); border-radius:20px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; color:var(--text-dim); text-align:center; padding:20px;
  }
  .player-box .play-ic{ width:70px; height:70px; border-radius:50%; background:var(--accent-soft); border:1px solid var(--border-strong); display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--accent); }
  .video-head{ margin-top:26px; display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap; }
  .video-head h2{ font-size:24px; margin-bottom:8px; }
  .video-head .dur-badge{ font-size:12px; color:var(--text-dim); }
  .mark-btn{ background:var(--surface); border:1px solid var(--border-strong); color:var(--text); padding:11px 22px; border-radius:10px; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .mark-btn.done{ background:var(--accent); color:var(--accent-ink); border-color:transparent; }

  .nav-buttons{ display:flex; justify-content:space-between; gap:14px; margin-top:30px; }
  .nav-btn{ flex:1; background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; padding:16px 20px; display:flex; flex-direction:column; gap:4px; transition:border-color .2s, transform .2s; }
  .nav-btn:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .nav-btn .lbl{ font-size:11px; color:var(--text-dim); }
  .nav-btn .ttl{ font-size:14px; font-weight:600; color:var(--text); }
  .nav-btn.disabled{ opacity:0.35; pointer-events:none; }

  .course-progress{ margin-top:34px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px; display:flex; justify-content:space-between; align-items:center; }
  .course-progress .txt{ font-size:13px; color:var(--text-muted); }
  .course-progress .bar{ width:160px; height:8px; border-radius:100px; background:var(--surface-2); overflow:hidden; }
  .course-progress .bar-fill{ height:100%; background:var(--accent); border-radius:100px; transition:width .3s; }

  @media (max-width: 900px){
    .layout{ grid-template-columns: 1fr; }
    .sidebar{ position:relative; top:0; max-height: 420px; border-left:none; border-bottom:1px solid var(--border); }
    .main{ padding: 24px 18px; }
  }
</style>
</head>
<body>

<div class="modal-overlay" id="restartModal">
  <div class="modal-box">
    <h3>إعادة الكورس من البداية؟</h3>
    <p>هيتشال علامة "متشاف" من كل فيديوهات الكورس ده. اكتب الرمز اللي في الصورة عشان تأكيد الطلب.</p>
    <div class="captcha-code" id="captchaDisplay"></div>
    <input type="text" id="captchaInput" placeholder="اكتب الرمز هنا" maxlength="4" inputmode="numeric">
    <div class="modal-error" id="captchaError"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="cancelRestart">إلغاء</button>
      <button class="modal-confirm" id="confirmRestart">تأكيد الإعادة</button>
    </div>
  </div>
</div>

<header>
  <div class="nav">
    <a href="index.html" class="logo"><div class="mark">AI</div><div class="name">Ahmed<span>.</span>Ibrahem</div></a>
    <div class="track-progress-mini">
      <span id="overallLabel">0 / 0 فيديو</span>
      <div class="bar"><div class="bar-fill" id="overallBar" style="width:0%"></div></div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="tabs" id="tabs"></div>
    <div class="sidebar-head" id="sidebarHead"></div>
    <div class="video-list" id="videoList"></div>
  </aside>

  <main class="main">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="player-box">
      <div class="play-ic">▶</div>
      <div>فيديو تجريبي — هيتحط هنا الفيديو الحقيقي أول ما يجهز</div>
    </div>
    <div class="video-head">
      <div>
        <h2 id="videoTitle"></h2>
        <div class="dur-badge" id="videoDur"></div>
      </div>
      <button class="mark-btn" id="markBtn">✓ علّم كمشاهَد</button>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn" style="text-align:right;">
        <span class="lbl">◄ السابق</span>
        <span class="ttl" id="prevTitle"></span>
      </button>
      <button class="nav-btn" id="nextBtn" style="text-align:left;">
        <span class="lbl">التالي ►</span>
        <span class="ttl" id="nextTitle"></span>
      </button>
    </div>

    <div class="course-progress">
      <span class="txt" id="courseProgressTxt"></span>
      <div class="bar"><div class="bar-fill" id="courseProgressBar" style="width:0%"></div></div>
    </div>
  </main>
</div>

// Flatten into ordered list with ids
const FLAT = [];
COURSES.forEach((c, ci) => {
  c.sections.forEach((s, si) => {
    s.videos.forEach((v, vi) => {
      FLAT.push({ id: `c${ci}-s${si}-v${vi}`, ci, si, vi, title: v.title, duration: v.duration,
                  courseTitle: c.titleAr, sectionTitle: s.title, courseNum: c.num });
    });
  });
});

const STORAGE_KEY = 'excelTrackProgress';
function getDone(){ try{ return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }catch(e){ return new Set(); } }
function setDone(set){ localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); }
let done = getDone();

let currentCourseIdx = 0;
let currentFlatIdx = 0;

function flatIndexOf(ci, si, vi){
  return FLAT.findIndex(f => f.ci===ci && f.si===si && f.vi===vi);
}

function getResumeFlatIndex(ci){
  const c = COURSES[ci];
  for(let si=0; si<c.sections.length; si++){
    const s = c.sections[si];
    for(let vi=0; vi<s.videos.length; vi++){
      const id = `c${ci}-s${si}-v${vi}`;
      if(!done.has(id)) return flatIndexOf(ci, si, vi);
    }
  }
  // everything in this course is already done — just show its first video
  return flatIndexOf(ci, 0, 0);
}

function renderTabs(){
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = '';
  COURSES.forEach((c, ci) => {
    const total = c.sections.reduce((a,s)=>a+s.videos.length,0);
    const doneCount = c.sections.reduce((a,s,si)=>a+s.videos.filter((v,vi)=>done.has(`c${ci}-s${si}-v${vi}`)).length,0);
    const btn = document.createElement('button');
    btn.className = 'tab' + (ci===currentCourseIdx ? ' active':'') + (doneCount===total ? ' done':'');
    btn.textContent = c.num;
    btn.title = c.titleAr;
    btn.onclick = () => { currentCourseIdx = ci; currentFlatIdx = getResumeFlatIndex(ci); renderAll(); };
    wrap.appendChild(btn);
  });
}

function renderSidebarHead(){
  const c = COURSES[currentCourseIdx];
  const total = c.sections.reduce((a,s)=>a+s.videos.length,0);
  const totalMin = c.sections.reduce((a,s)=>a+s.videos.reduce((b,v)=>b+v.duration,0),0);
  const head = document.getElementById('sidebarHead');
  head.innerHTML = `
    <h3>Course ${c.num} — ${c.titleEn}</h3>
    <div class="meta">${c.titleAr} · ${total} فيديو · ~${Math.round(totalMin/60*10)/10} ساعة</div>
    ${c.note ? `<div class="note">${c.note}</div>` : ''}
    <button class="restart-btn" id="restartBtn">↺ إعادة الكورس من البداية</button>
  `;
  document.getElementById('restartBtn').addEventListener('click', openRestartModal);
}

function renderVideoList(){
  const c = COURSES[currentCourseIdx];
  const wrap = document.getElementById('videoList');
  wrap.innerHTML = '';
  c.sections.forEach((s, si) => {
    const st = document.createElement('div');
    st.className = 'section-title';
    st.textContent = s.title;
    wrap.appendChild(st);
    s.videos.forEach((v, vi) => {
      const id = `c${currentCourseIdx}-s${si}-v${vi}`;
      const row = document.createElement('div');
      const isCurrent = FLAT[currentFlatIdx] && FLAT[currentFlatIdx].id === id;
      row.className = 'video-row' + (isCurrent ? ' current':'') + (done.has(id) ? ' done':'');
      row.innerHTML = `
        <input type="checkbox" ${done.has(id)?'checked':''} data-id="${id}">
        <span class="vtitle">${v.title}</span>
        <span class="vdur">${v.duration} د</span>
      `;
      row.querySelector('input').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDone(id);
      });
      row.addEventListener('click', () => {
        currentFlatIdx = flatIndexOf(currentCourseIdx, si, vi);
        renderAll();
      });
      wrap.appendChild(row);
    });
  });
}

function toggleDone(id){
  if(done.has(id)) done.delete(id); else done.add(id);
  setDone(done);
  renderAll();
}

function renderMain(){
  const f = FLAT[currentFlatIdx];
  if(!f) return;
  document.getElementById('breadcrumb').innerHTML = `Course ${f.courseNum} — <b>${f.courseTitle}</b> / ${f.sectionTitle}`;
  document.getElementById('videoTitle').textContent = f.title;
  document.getElementById('videoDur').textContent = `المدة التجريبية: ${f.duration} دقيقة`;

  const markBtn = document.getElementById('markBtn');
  const isDone = done.has(f.id);
  markBtn.className = 'mark-btn' + (isDone ? ' done':'');
  markBtn.textContent = isDone ? '✓ اتشاف' : '✓ علّم كمشاهَد';
  markBtn.onclick = () => toggleDone(f.id);

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const prev = FLAT[currentFlatIdx - 1];
  const next = FLAT[currentFlatIdx + 1];

  if(prev){
    prevBtn.classList.remove('disabled');
    document.getElementById('prevTitle').textContent = prev.title;
    prevBtn.onclick = () => { currentFlatIdx--; currentCourseIdx = FLAT[currentFlatIdx].ci; renderAll(); };
  } else {
    prevBtn.classList.add('disabled');
    document.getElementById('prevTitle').textContent = '—';
  }
  if(next){
    nextBtn.classList.remove('disabled');
    document.getElementById('nextTitle').textContent = next.title;
    nextBtn.onclick = () => { done.add(f.id); setDone(done); currentFlatIdx++; currentCourseIdx = FLAT[currentFlatIdx].ci; renderAll(); };
  } else {
    nextBtn.classList.add('disabled');
    document.getElementById('nextTitle').textContent = '—';
  }

  // course progress is shown for the course you're browsing (currentCourseIdx),
  // not necessarily the course of the video currently loaded in the player
  renderCourseProgress();
}

function renderCourseProgress(){
  const c = COURSES[currentCourseIdx];
  const total = c.sections.reduce((a,s)=>a+s.videos.length,0);
  const doneCount = c.sections.reduce((a,s,si)=>a+s.videos.filter((v,vi)=>done.has(`c${currentCourseIdx}-s${si}-v${vi}`)).length,0);
  document.getElementById('courseProgressTxt').textContent = `تقدمك في Course ${c.num}: ${total? Math.round(doneCount/total*100):0}% مكتمل (${doneCount} من ${total} فيديو)`;
  document.getElementById('courseProgressBar').style.width = (total? (doneCount/total*100):0) + '%';
}

function renderOverall(){
  const total = FLAT.length;
  const doneCount = FLAT.filter(f=>done.has(f.id)).length;
  document.getElementById('overallLabel').textContent = `${total? Math.round(doneCount/total*100):0}% من المسار مكتمل (${doneCount}/${total})`;
  document.getElementById('overallBar').style.width = (total? (doneCount/total*100):0) + '%';
}

function renderAll(){
  renderTabs();
  renderSidebarHead();
  renderVideoList();
  renderMain();
  renderOverall();
}

// If arriving from the curriculum page with ?course=N, jump straight to that course
const urlParams = new URLSearchParams(window.location.search);
const requestedCourse = parseInt(urlParams.get('course'), 10);
if (requestedCourse) {
  const idx = COURSES.findIndex(c => c.num === requestedCourse);
  if (idx !== -1) {
    currentCourseIdx = idx;
    currentFlatIdx = getResumeFlatIndex(idx);
  }
}

renderAll();

// ---- Restart course with captcha confirmation ----
let currentCaptcha = '';

function generateCaptcha(){
  currentCaptcha = String(Math.floor(1000 + Math.random() * 9000));
  const display = document.getElementById('captchaDisplay');
  display.innerHTML = '';
  const colors = ['#2fe8d6', '#eaf7f6', '#93b3b1', '#0f8c8c'];
  currentCaptcha.split('').forEach((digit) => {
    const span = document.createElement('span');
    span.textContent = digit;
    const rotate = (Math.random() * 34 - 17).toFixed(1);
    const skew = (Math.random() * 20 - 10).toFixed(1);
    const translateY = (Math.random() * 10 - 5).toFixed(1);
    const color = colors[Math.floor(Math.random() * colors.length)];
    span.style.transform = `rotate(${rotate}deg) skewX(${skew}deg) translateY(${translateY}px)`;
    span.style.color = color;
    span.style.textShadow = '1px 1px 0 rgba(0,0,0,0.35)';
    display.appendChild(span);
  });
}

function openRestartModal(){
  generateCaptcha();
  document.getElementById('captchaInput').value = '';
  document.getElementById('captchaError').textContent = '';
  document.getElementById('restartModal').classList.add('show');
}

function closeRestartModal(){
  document.getElementById('restartModal').classList.remove('show');
}

document.getElementById('cancelRestart').addEventListener('click', closeRestartModal);
document.getElementById('restartModal').addEventListener('click', (e) => {
  if(e.target.id === 'restartModal') closeRestartModal();
});

document.getElementById('confirmRestart').addEventListener('click', () => {
  const input = document.getElementById('captchaInput').value.trim();
  const errorBox = document.getElementById('captchaError');
  if(input !== currentCaptcha){
    errorBox.textContent = 'الرمز مش مطابق، حاول تاني.';
    generateCaptcha();
    document.getElementById('captchaInput').value = '';
    return;
  }
  // Clear all completed videos for the current course only
  [...done].forEach(id => {
    if(id.startsWith(`c${currentCourseIdx}-`)) done.delete(id);
  });
  setDone(done);
  currentFlatIdx = flatIndexOf(currentCourseIdx, 0, 0);
  closeRestartModal();
  renderAll();
});
</script>
